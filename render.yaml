# Render Blueprint — deploys the full Progressor monorepo.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: progressor-db
    databaseName: progressor
    user: progressor
    plan: free # O plano "free" ainda é válido para bases de dados

services:
  # ──────────────────────────────────────────────
  # 1. Backend — Spring Boot (Docker)
  # ──────────────────────────────────────────────
  - type: web
    name: progressor-api
    env: docker
    rootDir: backend
    plan: free # Para Web Services (Docker), "free" é o correto
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: progressor-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: progressor-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: progressor-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: progressor-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: progressor-db
          property: password
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET # Adicionei aqui caso seu app use
        sync: false

  # ──────────────────────────────────────────────
  # 2. Frontend — React/Vite (Static Site)
  # ──────────────────────────────────────────────
  - type: web
    name: progressor-web
    env: static # Aqui está o segredo: static sites não usam o campo "plan"
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # REMOVIDO: plan: free (Causa erro em env: static)
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html