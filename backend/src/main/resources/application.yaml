server:
  port: 8081

spring:
  application:
    name: progressor

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/progressorv1}
    username: ${SPRING_DATASOURCE_USERNAME:progressorv1}
    password: ${SPRING_DATASOURCE_PASSWORD:progressorv1}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      keepalive-time: 60000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=2h

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

encryption:
  key: ${ENCRYPTION_KEY}
